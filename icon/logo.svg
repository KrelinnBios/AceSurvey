  </defs>

  <use href="#note-shape" fill="none" stroke="#111111" stroke-width="3" stroke-opacity=".85" stroke-linejoin="round" mask="url(#outer-note-stroke-only)"/>
  <use href="#note-shape" fill="url(#ace-flag)"/>
  <path d="M68 14v15h15z" fill="#D8D1DE"/>
  <path d="M34 47h30M34 61h36M34 75h24" fill="none" stroke="#1A171F" stroke-opacity=".42" stroke-width="4" stroke-linecap="round"/>
  <path d="M34 88h30" fill="none" stroke="#FFFFFF" stroke-opacity=".5" stroke-width="4" stroke-linecap="round"/>
